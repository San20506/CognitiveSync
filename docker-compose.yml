services:
  db:
    image: postgres:16-alpine
    container_name: cognitivesync-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: cognitivesync
      POSTGRES_PASSWORD: cognitivesync_local
      POSTGRES_DB: cognitivesync
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./deploy/init-schemas.sql:/docker-entrypoint-initdb.d/init-schemas.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cognitivesync -d cognitivesync"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build: .
    container_name: cognitivesync-migrate
    command: uv run alembic upgrade head
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://cognitivesync:cognitivesync_local@db:5432/cognitivesync
      AUDIT_DATABASE_URL: postgresql+asyncpg://cognitivesync:cognitivesync_local@db:5432/cognitivesync
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    build: .
    container_name: cognitivesync-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://cognitivesync:cognitivesync_local@db:5432/cognitivesync
      AUDIT_DATABASE_URL: postgresql+asyncpg://cognitivesync:cognitivesync_local@db:5432/cognitivesync
      ADAPTER_MODE: mock
    volumes:
      - ./models:/app/models:ro       # checkpoint lives outside image
      - ./data:/app/data:ro           # synthetic CSVs
      - ./secrets:/app/secrets:ro     # JWT keypair
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  pg_data:
