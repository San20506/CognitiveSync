services:
  db:
    image: postgres:16-alpine
    container_name: cognitivesync-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: cognitivesync
      POSTGRES_PASSWORD: cognitivesync_local
      POSTGRES_DB: cognitivesync
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./deploy/init-schemas.sql:/docker-entrypoint-initdb.d/init-schemas.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cognitivesync -d cognitivesync"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pg_data:
